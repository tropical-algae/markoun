name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Setup | Checkout Repository
        uses: actions/checkout@v6

      - name: Setup | Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup | System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Setup | uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Setup | Python Dependencies
        run: uv sync --dev --frozen

      - name: Check | Pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Check | Backend Tests
        run: uv run poe test

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: checks
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Setup | Checkout Repository on Release Branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup | Reset Release Branch to Workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Action | Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.6.1
        with:
          config_file: semantic.toml
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com

      - name: Publish | Upload GitHub Release Assets
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10.6.1
        with:
          config_file: semantic.toml
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    environment: release
    needs: release
    if: needs.release.outputs.released == 'true'

    permissions:
      contents: read

    steps:
      - name: Setup | Checkout Released Tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup | Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup | Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup | Docker Metadata
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: tropicalalgae/markoun
          tags: |
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=latest

      - name: Publish | Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
